<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar · Auto Service</title>
  <link rel="icon" href="/auth-static/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Manrope:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root{
      --navy:#1c4362; --navy-deep:#10283b; --navy-line:#2b5a7e;
      --paper:#f3efe7; --card:#fbf9f4; --ink:#152430; --muted:#5e6e79; --line:#d8d0c2;
      --accent:#3a6d92; --err:#b1503f;
      --sans:"Manrope",system-ui,sans-serif; --disp:"Bricolage Grotesque",serif; --mono:"Space Mono",monospace;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:var(--sans);color:#fff;min-height:100vh;
      background:var(--navy-deep);
      background-image:
        radial-gradient(1200px 500px at 50% -10%, rgba(58,109,146,.35), transparent 60%),
        linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),
        linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);
      background-size:auto, 30px 30px, 30px 30px;
      display:flex;align-items:center;justify-content:center;padding:24px;
    }
    .box{width:100%;max-width:400px}
    .brand{text-align:center;margin-bottom:26px}
    .brand img{height:64px;filter:drop-shadow(0 8px 24px rgba(0,0,0,.35))}
    .brand .wm{font-family:var(--disp);font-weight:800;font-size:26px;margin-top:14px;letter-spacing:-.5px}
    .brand small{display:block;font-family:var(--mono);font-size:10px;letter-spacing:4px;opacity:.6;margin-top:4px}
    .card{
      background:var(--card);color:var(--ink);border-radius:6px;padding:32px 30px;position:relative;
      box-shadow:0 30px 60px -20px rgba(0,0,0,.5);
    }
    .card::before,.card::after{content:"";position:absolute;width:11px;height:11px;border:2px solid var(--navy)}
    .card::before{top:-1px;left:-1px;border-right:0;border-bottom:0}
    .card::after{bottom:-1px;right:-1px;border-left:0;border-top:0}
    .card h1{font-family:var(--disp);font-weight:700;font-size:22px;margin-bottom:4px}
    .card .sub{font-family:var(--mono);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:22px}
    .field{margin-bottom:16px}
    .field label{display:block;font-family:var(--mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
    .field input{width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:3px;background:var(--paper);color:var(--ink);font-size:15px;font-family:var(--sans)}
    .field input:focus{outline:none;border-color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent)}
    .btn{width:100%;margin-top:6px;padding:14px;border:none;border-radius:3px;background:var(--navy);color:#fff;font-weight:700;font-size:15px;cursor:pointer;font-family:var(--disp);letter-spacing:.3px;transition:.15s}
    .btn:hover{background:var(--navy-deep)}
    .err{background:rgba(177,80,63,.12);border:1px solid rgba(177,80,63,.4);color:var(--err);font-size:13px;padding:11px 13px;border-radius:3px;margin-bottom:18px;font-family:var(--mono)}
    .foot{text-align:center;margin-top:22px;font-family:var(--mono);font-size:10px;letter-spacing:1px;color:rgba(255,255,255,.4)}
  </style>
</head>
<body>
  <div class="box">
    <div class="brand">
      <img src="/auth-static/logo-branco.png" alt="Altcorp" />
      <div class="wm">Auto Service</div>
      <small>ALTCORP</small>
    </div>
    <div class="card">
      <h1>Acesso restrito</h1>
      <div class="sub">Autentique-se para continuar</div>
      {% if error %}<div class="err">⚠ {{ error }}</div>{% endif %}
      <form method="POST" action="/login">
        <input type="hidden" name="next" value="{{ next }}" />
        <div class="field">
          <label for="username">Usuário</label>
          <input id="username" name="username" type="text" autocomplete="username" autofocus required />
        </div>
        <div class="field">
          <label for="password">Senha</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required />
        </div>
        <button class="btn" type="submit">Entrar →</button>
      </form>
    </div>
    <div class="foot">© ALTCORP · AUTO SERVICE</div>
  </div>
</body>
</html>
