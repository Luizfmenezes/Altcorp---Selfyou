# ==========================================================================
#  Auto Service — Gateway Nginx (reverse proxy + login único via auth_request)
# ==========================================================================
# Hosts aceitos (domínio, IP da máquina e local). "_" = catch-all.
server {
    listen       80;
    server_name  altservice.altcorphub.com 192.168.15.18 localhost _;

    # Uploads grandes (imagens/PDFs) e timeouts p/ processamento de IA
    client_max_body_size 50m;
    proxy_read_timeout   600s;
    proxy_send_timeout   600s;

    # ----- Redireciona para o login quando não autenticado -----
    error_page 401 = @login_redirect;
    location @login_redirect {
        return 302 /login?next=$request_uri;
    }

    # ======================================================================
    #  ROTAS PÚBLICAS (sem login)
    # ======================================================================

    # Endpoint interno usado pelo auth_request
    location = /__auth {
        internal;
        proxy_pass              http://auth:5000/auth;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length "";
        proxy_set_header        X-Original-URI $request_uri;
        proxy_set_header        Cookie $http_cookie;
    }

    # Tela de login / logout
    location /login {
        proxy_pass       http://auth:5000/login;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /logout {
        proxy_pass       http://auth:5000/logout;
        proxy_set_header Host $host;
    }
    # Assets da tela de login (logos)
    location /auth-static/ {
        proxy_pass http://auth:5000/static/;
    }

    location = /healthz {
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # ======================================================================
    #  ROTAS PROTEGIDAS (exigem login)
    # ======================================================================

    # --- Hub (portal estático) ---
    location / {
        auth_request /__auth;
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ =404;
    }

    # --- Ferramentas de PDF (Stirling roda com context-path /pdf) ---
    location /pdf/ {
        auth_request /__auth;
        proxy_pass       http://stirling-pdf:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # --- Removedor de Fundo (Flask; prefixo /bg removido no upstream) ---
    location /bg/ {
        auth_request /__auth;
        proxy_pass       http://background-remover:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /bg;
    }

    # --- OCR (FastAPI; prefixo /ocr removido no upstream) ---
    location /ocr/ {
        auth_request /__auth;
        proxy_pass       http://paddleocr:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /ocr;
    }
}
