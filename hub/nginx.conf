# ==========================================================================
#  Auto Service — Gateway Nginx (reverse proxy + login único via auth_request)
# --------------------------------------------------------------------------
#  Robustez: usa o resolver DNS interno do Docker (127.0.0.11) + upstreams em
#  variáveis, para RE-RESOLVER os IPs dos containers em tempo de requisição.
#  Assim o gateway não quebra se um serviço reiniciar e mudar de IP.
#
#  Pensado para rodar atrás do Nginx Proxy Manager (que cuida de domínio/TLS)
#  encaminhando para 192.168.15.18:80.
# ==========================================================================
server {
    listen       80;
    server_name  altservice.altcorphub.com 192.168.15.18 localhost _;

    # Resolver do Docker — re-resolve nomes dos containers dinamicamente
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Uploads grandes e timeouts para processamento de IA
    client_max_body_size 50m;
    proxy_read_timeout   600s;
    proxy_send_timeout   600s;

    # ----- Redireciona para o login quando não autenticado -----
    error_page 401 = @login_redirect;
    location @login_redirect {
        return 302 /login?next=$request_uri;
    }

    # ======================================================================
    #  ROTAS PÚBLICAS (sem login)
    # ======================================================================

    # Endpoint interno usado pelo auth_request
    location = /__auth {
        internal;
        set $up_auth http://auth:5000;
        proxy_pass               $up_auth/auth;
        proxy_pass_request_body  off;
        proxy_set_header         Content-Length "";
        proxy_set_header         X-Original-URI $request_uri;
        proxy_set_header         Cookie $http_cookie;
    }

    # Tela de login / logout
    location /login {
        set $up_auth http://auth:5000;
        proxy_pass       $up_auth/login$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /logout {
        set $up_auth http://auth:5000;
        proxy_pass       $up_auth/logout;
        proxy_set_header Host $host;
    }
    # Assets da tela de login (logos)
    location /auth-static/ {
        set $up_auth http://auth:5000;
        rewrite ^/auth-static/(.*)$ /static/$1 break;
        proxy_pass $up_auth;
    }

    # Favicon público (evita ruído de 404/redirect no navegador)
    location = /favicon.ico {
        alias /usr/share/nginx/html/assets/favicon.ico;
        access_log off;
    }

    location = /healthz {
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # ======================================================================
    #  ROTAS PROTEGIDAS (exigem login)
    # ======================================================================

    # --- Hub (portal estático) ---
    location / {
        auth_request /__auth;
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ =404;
    }

    # --- Ferramentas de PDF (Stirling roda com context-path /pdf) ---
    location /pdf/ {
        auth_request /__auth;
        set $up_pdf http://stirling-pdf:8080;
        proxy_pass       $up_pdf$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # --- Removedor de Fundo (Flask; prefixo /bg removido no upstream) ---
    location /bg/ {
        auth_request /__auth;
        set $up_bg http://background-remover:5000;
        rewrite ^/bg/(.*)$ /$1 break;
        proxy_pass       $up_bg;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /bg;
    }

    # --- OCR (FastAPI; prefixo /ocr removido no upstream) ---
    location /ocr/ {
        auth_request /__auth;
        set $up_ocr http://paddleocr:8000;
        rewrite ^/ocr/(.*)$ /$1 break;
        proxy_pass       $up_ocr;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /ocr;
    }
}
